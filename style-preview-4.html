<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style 4 - Warm & Cozy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #F5EFE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #FFFCF7;
      border-radius: 20px;
      padding: 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(101,67,33,0.08);
      border: 1px solid #EDE4D6;
    }
    .coffee-icon {
      font-size: 36px;
      margin-bottom: 24px;
      display: block;
    }
    .step {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #B08B6E;
      margin-bottom: 12px;
    }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: #EDE4D6;
      border-radius: 3px;
      margin-bottom: 36px;
    }
    .progress-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #8B5E3C, #C4956A);
      border-radius: 3px;
    }
    h1 {
      font-family: 'Lora', serif;
      font-size: 26px;
      font-weight: 600;
      color: #2C1810;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      border: 1.5px solid #EDE4D6;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 15px;
      color: #5C3D2E;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
    }
    .option:hover { border-color: #C4956A; background: #FFFAF5; }
    .option.selected { border-color: #8B5E3C; background: #8B5E3C; color: white; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid currentColor;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .option.selected .dot {
      background: white;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="coffee-icon">☕</span>
    <div class="step">Question 3 of 5</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <h1>It's Saturday morning. What's your ideal start to the day?</h1>
    <div class="options">
      <div class="option selected">
        <div class="dot"></div>
        Early run, then a green smoothie
      </div>
      <div class="option">
        <div class="dot"></div>
        Slow read with something warm
      </div>
      <div class="option">
        <div class="dot"></div>
        Whatever's easy — no planning required
      </div>
      <div class="option">
        <div class="dot"></div>
        Meditation and a quiet moment alone
      </div>
    </div>
  </div>
</body>
</html>
