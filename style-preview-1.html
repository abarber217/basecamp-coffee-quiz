<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style 1 - Playful & Colorful</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 50%, #4ECDC4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 8px 8px 0px #FF6B6B;
    }
    .label {
      background: #FFE66D;
      color: #333;
      font-weight: 900;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      color: #222;
      margin-bottom: 32px;
      line-height: 1.3;
    }
    .options { display: flex; flex-direction: column; gap: 14px; }
    .option {
      border: 3px solid #eee;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option:hover { border-color: #FF6B6B; background: #FFF5F5; transform: translateX(4px); }
    .option.selected { border-color: #FF6B6B; background: #FF6B6B; color: white; }
    .emoji { font-size: 24px; }
    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #eee; }
    .dot.active { background: #FF6B6B; }
    .dot.done { background: #4ECDC4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="progress">
      <div class="dot done"></div>
      <div class="dot done"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="label">Question 3 of 5</div>
    <h1>It's Saturday morning. What's your ideal start to the day? ☀️</h1>
    <div class="options">
      <div class="option selected">
        <span class="emoji">🏃</span>
        Early run, then a green smoothie
      </div>
      <div class="option">
        <span class="emoji">📚</span>
        Slow read with something warm
      </div>
      <div class="option">
        <span class="emoji">🛋️</span>
        Whatever's easy — no planning required
      </div>
      <div class="option">
        <span class="emoji">🧘</span>
        Meditation and a quiet moment alone
      </div>
    </div>
  </div>
</body>
</html>
